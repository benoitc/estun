site_name: estun
site_description: Erlang STUN Client for NAT Traversal and Hole Punching
site_author: Benoit Chesneau
site_url: https://github.com/benoitc/estun

repo_name: benoitc/estun
repo_url: https://github.com/benoitc/estun

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - tags

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Configuration: getting-started/configuration.md
  - User Guide:
    - Basic Usage: guide/basic-usage.md
    - NAT Discovery: guide/nat-discovery.md
    - Hole Punching: guide/hole-punching.md
    - Authentication: guide/authentication.md
    - Event Handling: guide/events.md
  - API Reference:
    - estun: api/estun.md
    - estun_codec: api/estun_codec.md
    - estun_client: api/estun_client.md
    - estun_socket: api/estun_socket.md
    - estun_nat_discovery: api/estun_nat_discovery.md
    - estun_punch: api/estun_punch.md
  - Examples:
    - Simple Discovery: examples/simple-discovery.md
    - P2P Connection: examples/p2p-connection.md
    - NAT Type Detection: examples/nat-detection.md
  - Architecture: architecture.md
  - RFC Reference: rfc-reference.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/benoitc/estun

copyright: Copyright &copy; 2024 Benoit Chesneau
